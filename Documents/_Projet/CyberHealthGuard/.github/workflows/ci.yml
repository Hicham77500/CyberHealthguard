name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      NODE_VERSION: "20"
      PYTHON_VERSION: "3.11"
      TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
      TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
      TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Node deps
        if: ${{ hashFiles('package-lock.json', 'pnpm-lock.yaml', 'yarn.lock') != '' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: pip install -r requirements.txt

      - name: Anti-doublons
        run: python scripts/anti_dup.py --strict

      - name: npm test
        if: ${{ hashFiles('package.json') != '' }}
        run: npm test --if-present

      - name: pytest
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest
          else
            echo "no tests directory"
          fi

      - name: Vérifier TRELLO_SYNC
        if: ${{ env.TRELLO_KEY != '' && env.TRELLO_TOKEN != '' && env.TRELLO_BOARD_ID != '' }}
        run: python scripts/trello_update.py --board-id "$TRELLO_BOARD_ID" --check
